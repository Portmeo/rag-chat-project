version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      # Forzar a Qdrant a ser conservador con la RAM
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD=10000 
    deploy:
      resources:
        limits:
          memory: 1G  # Límite estricto para proteger a Ollama
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
